name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      - name: pytest (parser)
        run: pytest tests/test_build.py -v

      - name: canEdit unit
        run: |
          python3 build.py sample.ged > /dev/null
          php tests/test_can_edit.php

      - name: famtree mapping unit
        run: |
          python3 build.py sample.ged > /dev/null
          php tests/test_boom_data.php

      - name: pedigree render unit
        run: |
          python3 build.py sample.ged > /dev/null
          php tests/test_pedigree.php

      - name: smoke v1
        run: bash tests/smoke.sh

      - name: smoke v2
        run: bash tests/smoke_v2.sh
